<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rabbit Hole Terminal</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; overflow: hidden; }
        #terminal { height: 90vh; overflow-y: auto; scroll-behavior: smooth; }
        .input-line { display: flex; align-items: center; }
        input { background: transparent; border: none; color: #00ff00; font-family: inherit; font-size: inherit; outline: none; flex-grow: 1; }
        .system-log { color: #ff00ff; font-style: italic; opacity: 0.7; }
        .wiki-title { color: #fff; font-weight: bold; text-transform: uppercase; }
        hr { border: 0; border-top: 1px solid #00ff00; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="terminal">
        <div>██║ RABBIT HOLE SYSTEM v1.0.4 ║██</div>
        <div>Initializing semantic bridge...</div><br>
    </div>
    <div class="input-line">
        <span>>&nbsp;</span><input type="text" id="cmd" autofocus autocomplete="off">
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const input = document.getElementById('cmd');
        let path = [];
        let state = "START"; 
        let currentTopic = "";
        let nextTopic = "";

        async function typeText(text, isLog = false) {
            const line = document.createElement('div');
            if (isLog) line.className = 'system-log';
            terminal.appendChild(line);
            
            for (let i = 0; i < text.length; i++) {
                line.textContent += text[i];
                await new Promise(r => setTimeout(r, 5));
            }
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function fetchWiki(topic) {
            const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${topic.replace(/ /g, '_')}`;
            const res = await fetch(url);
            return await res.json();
        }

        async function fetchRelated(topic) {
            const url = `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&titles=${topic}&prop=links&pllimit=20`;
            const res = await fetch(url);
            const data = await res.json();
            const pages = data.query.pages;
            const links = pages[Object.keys(pages)[0]].links || [];
            return links.map(l => l.title).filter(t => !t.includes(':'));
        }

        async function processCommand(val) {
            const cmd = val.trim();
            if (!cmd && state !== "GAME") return;

            if (state === "START") {
                currentTopic = cmd;
                await runStep();
            } else if (state === "CHOICE") {
                if (cmd.toLowerCase() === 'y') {
                    currentTopic = nextTopic;
                    await runStep();
                } else {
                    state = "END";
                    await typeText("\n[ANALYSIS] COMPILING PATTERN REPORT...");
                    await new Promise(r => setTimeout(r, 1000));
                    await typeText("THE TRAIL: " + path.join(" -> "));
                    await typeText("\nSIGNAL LOST. Press Refresh to reboot.");
                    input.disabled = true;
                }
            }
        }

        async function runStep() {
            state = "WAITING";
            path.push(currentTopic);
            await typeText(`\nSEARCHING: ${currentTopic}...`);
            
            try {
                const data = await fetchWiki(currentTopic);
                await typeText(`----------------------------------------------------`);
                await typeText(`TOPIC: ${data.title}`);
                await typeText(data.extract || "No data found.");
                await typeText(`----------------------------------------------------`);

                const related = await fetchRelated(currentTopic);
                nextTopic = related[Math.floor(Math.random() * related.length)];
                
                if (Math.random() > 0.5) {
                    await typeText(`[WARN] Semantic drift detected: ${Math.floor(Math.random()*100)}%`, true);
                }

                await typeText(`\nCONNECTION FOUND: ${nextTopic}`);
                await typeText("GO DEEPER? (y/n)");
                state = "CHOICE";
            } catch (e) {
                await typeText("ERROR: CONNECTION TIMEOUT");
            }
        }

        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = input.value;
                input.value = '';
                const userLine = document.createElement('div');
                userLine.textContent = `> ${val}`;
                terminal.appendChild(userLine);
                await processCommand(val);
            }
        });

        typeText("ENTER STARTING TOPIC TO BEGIN:");
    </script>
</body>
</html>

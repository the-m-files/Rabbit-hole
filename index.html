<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rabbit Hole Terminal</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; overflow: hidden; }
        #terminal { height: 90vh; overflow-y: auto; scroll-behavior: smooth; }
        .input-line { display: flex; align-items: center; }
        input { background: transparent; border: none; color: #00ff00; font-family: inherit; font-size: inherit; outline: none; flex-grow: 1; width: 100%; }
        .system-log { color: #ff00ff; font-style: italic; opacity: 0.8; margin: 5px 0; }
        .wiki-title { color: #fff; font-weight: bold; text-decoration: underline; }
        .conspiracy-report { color: #00ffff; border: 1px dashed #00ffff; padding: 10px; margin-top: 20px; }
        hr { border: 0; border-top: 1px solid #00ff00; margin: 10px 0; }
        ::selection { background: #00ff00; color: #000; }
    </style>
</head>
<body>
    <div id="terminal">
        <div>██████╗  █████╗ ██████╗ ██████╗ ██╗████████╗</div>
        <div>██╔══██╗██╔══██╗██╔══██╗██╔══██╗██║╚══██╔══╝</div>
        <div>██████╔╝███████║██████╔╝██████╔╝██║   ██║   </div>
        <div>██╔══██╗██╔══██║██╔══██╗██╔══██╗██║   ██║   </div>
        <div>██║  ██║██║  ██║██████╔╝██████╔╝██║   ██║   </div>
        <div>╚═╝  ╚═╝╚═╝  ╚═╝╚═════╝ ╚═════╝ ╚═╝   ╚═╝   </div>
        <div style="margin-bottom: 20px;">INTERNET RABBIT HOLE GENERATOR v2.0.1</div>
    </div>
    <div class="input-line">
        <span>>&nbsp;</span><input type="text" id="cmd" autofocus autocomplete="off">
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const input = document.getElementById('cmd');
        
        let path = [];
        let state = "START"; 
        let currentTopic = "";
        let nextTopic = "";

        // --- CONSPIRACY DICTIONARIES ---
        const openings = [
            "ANALYSIS COMPLETE: non-random structure detected in traversal sequence.",
            "PATTERN ENGINE ACTIVE: reconstructing hidden relational map...",
            "WARNING: semantic drift has exceeded normal thresholds.",
            "OBSERVATION: topic sequence is beginning to exhibit self-similarity."
        ];
        const linkers = [
            "is not isolated from",
            "exhibits hidden correlation with",
            "forms latent structure with",
            "shows recursive linkage to",
            "suggests dependency relationship with"
        ];
        const escalation = [
            "This implies a layered informational architecture beneath surface topics.",
            "Such transitions are unlikely without structured influence.",
            "Pattern continuity suggests an external organizing bias.",
            "The traversal begins to resemble a guided path rather than random walk."
        ];
        const endings = [
            "NOTE: interpretation is probabilistic and not confirmed reality.",
            "SYSTEM WARNING: excessive pattern interpretation detected.",
            "CONCLUSION: structure may be emergent rather than intentional.",
            "RESULT: meaning density exceeds baseline expectation."
        ];

        async function typeText(text, className = "", speed = 5) {
            const line = document.createElement('div');
            if (className) line.className = className;
            terminal.appendChild(line);
            
            // Process text to handle newlines
            const parts = text.split('\n');
            for (let p = 0; p < parts.length; p++) {
                for (let i = 0; i < parts[p].length; i++) {
                    line.innerHTML += parts[p][i];
                    await new Promise(r => setTimeout(r, speed));
                }
                if (p < parts.length - 1) line.innerHTML += '<br>';
            }
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function fetchWiki(topic) {
            const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(topic.replace(/ /g, '_'))}`;
            const res = await fetch(url);
            return await res.json();
        }

        async function fetchRelated(topic) {
            const url = `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&titles=${encodeURIComponent(topic)}&prop=links&pllimit=20`;
            const res = await fetch(url);
            const data = await res.json();
            const pages = data.query.pages;
            const links = pages[Object.keys(pages)[0]].links || [];
            return links.map(l => l.title).filter(t => !t.includes(':') && t.length < 40);
        }

        function getFakeLog(a, b) {
            const logs = [
                `[WARN] semantic drift detected between '${a}' and '${b}'`,
                `[TRACE] recursive link stabilized at depth ${path.length}`,
                `[INFO] background correlation increased: ${Math.floor(Math.random() * 50) + 20}%`,
                `[ALERT] repeated conceptual signature emerging`
            ];
            return logs[Math.floor(Math.random() * logs.length)];
        }

        async function generateReport() {
            if (path.length < 2) return "TRAJECTORY TOO SHORT FOR PATTERN EXTRACTION.";
            
            let report = `\n${openings[Math.floor(Math.random() * openings.length)]}\n\n`;
            for (let i = 0; i < path.length - 1; i++) {
                report += `* ${path[i]} ${linkers[Math.floor(Math.random() * linkers.length)]} ${path[i+1]}.\n`;
                if (Math.random() > 0.6) {
                    report += `  > ${escalation[Math.floor(Math.random() * escalation.length)]}\n`;
                }
            }
            report += `\n${endings[Math.floor(Math.random() * endings.length)]}`;
            return report;
        }

        async function processCommand(val) {
            const cmd = val.trim();
            if (state === "START") {
                currentTopic = cmd;
                await runStep();
            } else if (state === "CHOICE") {
                if (cmd.toLowerCase() === 'y') {
                    currentTopic = nextTopic;
                    await runStep();
                } else if (cmd.toLowerCase() === 'n') {
                    state = "END";
                    input.disabled = true;
                    await typeText("\nCOMPILING HIDDEN CONNECTIONS...", "system-log", 30);
                    await new Promise(r => setTimeout(r, 1500));
                    
                    const report = await generateReport();
                    await typeText("====================================================");
                    await typeText("CLASSIFIED PATTERN REPORT", "wiki-title");
                    await typeText("====================================================");
                    await typeText(report, "conspiracy-report", 10);
                    await typeText("====================================================");
                    await typeText("\nYou escaped the rabbit hole. Terminal locked.");
                }
            }
        }

        async function runStep() {
            state = "WAITING";
            path.push(currentTopic);
            await typeText(`\n[DEPTH: ${path.length}] Searching the internet...`, "", 20);
            
            try {
                const data = await fetchWiki(currentTopic);
                await typeText(`\n====================================================`);
                await typeText(`TOPIC: ${data.title.toUpperCase()}`, "wiki-title");
                await typeText(`====================================================`);
                await typeText(data.extract || "No data found.", "", 2);
                await typeText(`====================================================`);

                const related = await fetchRelated(currentTopic);
                if (related.length === 0) {
                    await typeText("\n[ERROR] THE TRAIL HAS GONE COLD. SYSTEM REBOOT REQUIRED.");
                    return;
                }
                
                nextTopic = related[Math.floor(Math.random() * related.length)];
                
                await new Promise(r => setTimeout(r, 1000));
                await typeText(`\nOne thing leads to another...`);
                await typeText(`'${currentTopic}' connects to '${nextTopic}'`);

                if (Math.random() > 0.4) {
                    await typeText(getFakeLog(currentTopic, nextTopic), "system-log");
                }

                await typeText("\nGO DEEPER? (y/n)");
                state = "CHOICE";
            } catch (e) {
                await typeText("\n[CRITICAL ERROR] UNABLE TO RESOLVE NODE.");
            }
        }

        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = input.value;
                input.value = '';
                if (state === "WAITING") return;
                
                const userLine = document.createElement('div');
                userLine.textContent = `> ${val}`;
                terminal.appendChild(userLine);
                terminal.scrollTop = terminal.scrollHeight;
                
                await processCommand(val);
            }
        });

        typeText("ENTER STARTING TOPIC:");
    </script>
</body>
</html>
